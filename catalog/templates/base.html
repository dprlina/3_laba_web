{% load book_extras %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжный каталог{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .footer { margin-top: 3rem; padding: 1rem 0; background-color: #e9ecef; text-align: center; }
        .rating { color: #ffc107; font-size: 1.2rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'catalog:book_list' %}">📚 BookCatalog</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text">{% current_year %} — Учебный проект</span>
            </div>
        </div>
    </nav>
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="container">
            <span>© {% current_year %} Книжный каталог</span>
        </div>
    </footer>
</body>
</html>
